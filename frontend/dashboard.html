<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMS Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-wrapper">
      <!-- Top Header -->
      <header class="top-header">
        <div class="header-search">
          <i data-lucide="search"></i>
          <input type="text" placeholder="Search visitors or employees..." id="globalSearch">
        </div>
        <div class="header-actions">
          <button class="icon-btn" onclick="toast('No new notifications')"><i data-lucide="bell"></i></button>
          <div class="avatar" id="headerAvatar">U</div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main-content" id="mainContent">
        <!-- Page content injected here -->
      </main>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle"></h3>
        <button class="icon-btn" onclick="closeModal()"><i data-lucide="x"></i></button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="ui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="app.js"></script>
</body>
</html>
